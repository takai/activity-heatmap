[tools]
go = "1.26.3"
golangci-lint = "v2.12.2"
hk = "1.45.0"
pkl = "0.31.1"

[tasks.build]
description = "Build the app binary"
run = "go build -o bin/activity-heatmap ./cmd/activity-heatmap/"

[tasks.lint]
description = "Run golangci-lint"
run = [
    "go fix ./...",
    "golangci-lint run ./...",
]

[tasks.test]
description = "Run all tests"
run = "go test ./..."
